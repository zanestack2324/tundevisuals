  <script>
  (function() {
    'use strict';
    var defaultServices = [
      { icon: '&#127874;', title: 'Birthday / Portrait', desc: "Celebrate life's moments with stunning portraits and birthday shoots that tell your unique story." },
      { icon: '&#128100;', title: 'Headshots &amp; Branding', desc: 'Professional headshots and brand imagery that capture your personality and elevate your presence.' },
      { icon: '&#128141;', title: 'Weddings', desc: 'Cinematic wedding films and timeless photographs that weave your love story into lasting memories.' },
      { icon: '&#127916;', title: 'Music Videos', desc: 'Dynamic music video production — from concept development to final cut — for artists and labels.' },
      { icon: '&#127917;', title: 'Event Coverage', desc: 'Full-day event coverage with multi-camera setups, aerial shots, and same-day edits available.' }
    ];
    var services = (function() {
      try { var s = localStorage.getItem('tv_services'); return s ? JSON.parse(s) : defaultServices; }
      catch(e) { return defaultServices; }
    })();
    var icons = ['&#127874;','&#128100;','&#128141;','&#127916;','&#127917;'];
    var anims = ['reveal-zoom','reveal-fade','reveal-zoom','reveal-fade','reveal-zoom'];
    var grid = document.getElementById('servicesGrid');
    services.forEach(function(svc, i) {
      var div = document.createElement('div');
      div.className = 'service-card burnt-paper ' + (anims[i % anims.length] || 'reveal');
      div.innerHTML = '<span class="icon">' + (icons[i % icons.length]) + '</span><h3>' + svc.title + '</h3><p>' + svc.desc + '</p>';
      grid.appendChild(div);
    });
  })();
  </script>
