    var galleryData = (function() {
      try {
        var stored = localStorage.getItem('tv_gallery');
        return stored ? JSON.parse(stored) : defaultGallery;
      } catch(e) { return defaultGallery; }
    })();

    var lightboxImages = [];
    var lightboxIndex = 0;
    var galleryGrid = $('galleryGrid');
    var lightbox = $('lightbox');
    var lightboxImg = $('lightboxImg');
    var lightboxCounter = $('lightboxCounter');
    var lightboxClose = $('lightboxClose');
    var lightboxPrev = $('lightboxPrev');
    var lightboxNext = $('lightboxNext');

    function renderGallery(category) {
      var filtered = category === 'all'
        ? galleryData
        : galleryData.filter(function(i) { return i.category === category || i.category === 'all'; });
      lightboxImages = filtered;
      galleryGrid.innerHTML = '';
      var frag = document.createDocumentFragment();
      for (var i = 0; i < filtered.length; i++) {
        var item = filtered[i];
        var div = document.createElement('div');
        div.className = 'gallery-item';
        var img = document.createElement('img');
        img.alt = item.label + ' - Tunde Visuals';
        img.src = item.src;
        img.loading = 'lazy';
        img.fetchPriority = 'low';
        (function(idx) {
          div.addEventListener('click', function() {
            openLightbox(idx);
          });
        })(i);
        div.appendChild(img);
        var label = document.createElement('div');
        label.className = 'gallery-label';
        label.textContent = item.label;
        div.appendChild(label);
        frag.appendChild(div);
      }
      galleryGrid.appendChild(frag);
    }

    function openLightbox(index) {
      lightboxIndex = index;
      updateLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function updateLightbox() {
      var item = lightboxImages[lightboxIndex];
      lightboxImg.src = item.src;
      lightboxImg.alt = item.label;
      lightboxCounter.textContent = (lightboxIndex + 1) + ' / ' + lightboxImages.length;
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightboxPrev.addEventListener('click', function() {
      lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
      updateLightbox();
    });

    lightboxNext.addEventListener('click', function() {
      lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
      updateLightbox();
    });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { lightboxPrev.click(); }
      if (e.key === 'ArrowRight') { lightboxNext.click(); }
    });

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    var tabs = [].slice.call(document.querySelectorAll('.gallery-tab'));
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        tabs.forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        renderGallery(this.getAttribute('data-category'));
      });
    });

    renderGallery('all');
