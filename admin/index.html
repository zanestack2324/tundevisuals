<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Tunde Visuals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-login">
    <div class="login-card">
      <div class="login-logo">
        <img src="../LOGO%20PNG.PNG" alt="Tunde Visuals">
      </div>
      <h1>Admin Login</h1>
      <p class="login-sub">Enter your credentials to access the dashboard</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="admin">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••">
        </div>
        <div class="form-error" id="loginError">Invalid credentials</div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script>
    function hash(str) {
      var h = 0;
      for (var i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
      return h;
    }
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var user = document.getElementById('username').value;
      var pass = document.getElementById('password').value;
      if (hash(user) === 92636453 && hash(pass) === -1918211901) {
        sessionStorage.setItem('tv_admin', '1');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').classList.add('show');
      }
    });
  </script>
</body>
</html>
